name: 🤖 AI Fix Request
description: Request the AI agentic workflow to analyse and propose a draft fix for this issue.
title: "[ai-fix] "
labels:
  - ai-fix
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        > **How this works:**
        > Submitting this issue will automatically apply the `ai-fix` label.
        > The AI agentic workflow will then create a draft Pull Request with a proposed fix for your team to review.
        >
        > Be as specific as possible — the more context you provide, the better the AI's proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: What is wrong? What behaviour is observed?
      placeholder: |
        Describe the bug, vulnerability, or broken feature in clear terms.
        Example: "The login endpoint does not rate-limit failed attempts, allowing brute-force attacks."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What should happen instead?
      placeholder: "After 5 failed login attempts, the account should be locked for 15 minutes."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can the problem be reliably reproduced?
      placeholder: |
        1. POST /login with wrong credentials 6 times
        2. Observe that the 7th attempt still returns a 200 with valid token
    validations:
      required: false

  - type: input
    id: files
    attributes:
      label: Relevant Files (optional)
      description: Comma-separated list of file paths that are likely involved.
      placeholder: "src/auth.py, tests/unit/test_auth.py"
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How critical is this issue?
      options:
        - Critical — security vulnerability or data loss
        - High — major feature broken
        - Medium — partial functionality degraded
        - Low — cosmetic or minor issue
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched for duplicate issues
          required: true
        - label: I understand the AI will produce a **draft PR** that requires human review before merging
          required: true
