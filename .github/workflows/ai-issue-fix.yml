---
name: AI Issue Fix
run-name: "🤖 AI Fix for Issue #${{ github.event.issue.number }} — ${{ github.event.issue.title }}"

on: # yamllint disable-line rule:truthy
  issues:
    types: [labeled]

concurrency:
  group: ai-issue-fix-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  models: read

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Guard: only run when the 'ai-fix' label is applied
  # ─────────────────────────────────────────────────────────────────────────────
  guard:
    name: Check Label
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}

    steps:
      - name: Check for ai-fix label
        id: check
        run: |
          if [[ "${{ github.event.label.name }}" == "ai-fix" ]]; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
            echo "✅ Label 'ai-fix' detected — proceeding with AI fix workflow."
          else
            echo "should-run=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Label '${{ github.event.label.name }}' applied — not 'ai-fix', skipping."
          fi
        shell: bash

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Triage — acknowledge the issue, create a branch
  # ─────────────────────────────────────────────────────────────────────────────
  triage:
    name: Triage Issue
    needs: guard
    if: needs.guard.outputs.should-run == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      branch-name: ${{ steps.branch.outputs.branch-name }}
      issue-context: ${{ steps.context.outputs.issue-context }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build issue context
        id: context
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_LABELS: ${{ toJson(github.event.issue.labels.*.name) }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          CONTEXT=$(cat <<EOF
          Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}
          URL: ${ISSUE_URL}
          Labels: ${ISSUE_LABELS}

          ${ISSUE_BODY}
          EOF
          )
          # Store as multiline output
          {
            echo "issue-context<<CONTEXT_EOF"
            echo "$CONTEXT"
            echo "CONTEXT_EOF"
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Create branch
        id: branch
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          # Slugify the issue title: lowercase, replace non-alphanumeric with hyphens, trim
          SLUG=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\+/-/g' | sed 's/^-\|-$//g' | cut -c1-40)
          BRANCH="ai/issue-${ISSUE_NUMBER}-${SLUG}"
          echo "branch-name=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "🌿 Branch name: ${BRANCH}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
        shell: bash

      - name: Post acknowledgement comment on issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ steps.branch.outputs.branch-name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<EOF
          ## 🤖 AI Agentic Workflow Triggered

          The **ai-fix** label was applied to this issue. The AI agentic workflow has started.

          **Status:** Analysing the issue and generating a proposed fix…
          **Branch:** \`${BRANCH_NAME}\`
          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          A draft Pull Request will be opened shortly. Your team will need to review, test, and approve the proposed changes before merging.

          > ⚠️ AI-generated code requires human review. Do not merge without verification.
          EOF
          )"
        shell: bash

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: AI Generate — trigger Copilot coding agent or GitHub Models fallback
  # ─────────────────────────────────────────────────────────────────────────────
  ai-generate:
    name: AI Code Generation
    needs: triage
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      changes-made: ${{ steps.detect-changes.outputs.changes-made }}

    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.triage.outputs.branch-name }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
        shell: bash

      # Primary path: assign issue to Copilot coding agent via REST API
      # The native agent will check out the branch, apply fixes, and push commits.
      - name: Trigger Copilot coding agent
        id: copilot-agent
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          echo "🤖 Attempting to assign issue to Copilot coding agent…"
          HTTP_STATUS=$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/assignees" \
            -f "assignees[]=copilot" \
            --silent \
            --include \
            2>&1 | grep "HTTP/" | awk '{print $2}' || echo "000")

          if [[ "$HTTP_STATUS" == "201" ]]; then
            echo "✅ Issue assigned to Copilot coding agent successfully."
            echo "copilot-assigned=true" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️  Could not assign to Copilot coding agent (HTTP ${HTTP_STATUS}). Will use GitHub Models fallback."
            echo "copilot-assigned=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      # Fallback path: GitHub Models API via actions/ai-inference
      # Provides a structured analysis and suggested code changes as a PR comment.
      - name: Install UV (fallback)
        if: steps.copilot-agent.outputs.copilot-assigned != 'true'
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          version: 0.9.18

      - name: AI analysis via GitHub Models (fallback)
        if: steps.copilot-agent.outputs.copilot-assigned != 'true'
        id: ai-analysis
        uses: actions/ai-inference@v1.0.0
        with:
          model: openai/gpt-4o
          system-prompt-file: .github/prompt/issue-fix.prompt.md
          prompt: |
            Analyse the following GitHub issue and produce a structured fix proposal for the codebase.

            ${{ needs.triage.outputs.issue-context }}

            ---
            Provide your response in this exact format:

            ## Root Cause Analysis
            <concise explanation of what is broken and why>

            ## Proposed Fix
            <step-by-step description of code changes needed>

            ## Files to Modify
            <list each file with the specific change required>

            ## Test Coverage
            <describe what tests should be added or updated>

            ## Assumptions
            <list any assumptions made due to missing context>

      - name: Write AI analysis to branch
        if: steps.copilot-agent.outputs.copilot-assigned != 'true' && steps.ai-analysis.outputs.response != ''
        env:
          AI_RESPONSE: ${{ steps.ai-analysis.outputs.response }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          mkdir -p .github/ai-proposals
          PROPOSAL_FILE=".github/ai-proposals/issue-${ISSUE_NUMBER}-analysis.md"
          cat > "$PROPOSAL_FILE" <<EOF
          # AI Fix Proposal — Issue #${ISSUE_NUMBER}

          > **Generated by:** GitHub Models (fallback path)
          > **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          > **⚠️ This is an AI analysis, not automatically applied code. A developer must implement the changes.**

          ${AI_RESPONSE}
          EOF

          git add "$PROPOSAL_FILE"
          git commit -m "chore(ai): add AI fix proposal for issue #${ISSUE_NUMBER}

          Generated by GitHub Models (gpt-4o) as part of the ai-fix agentic workflow.
          This proposal requires human review and implementation.

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git push origin "${{ needs.triage.outputs.branch-name }}"
        shell: bash

      - name: Detect if any changes were made
        id: detect-changes
        run: |
          COMMITS=$(git --no-pager log origin/main.."${{ needs.triage.outputs.branch-name }}" --oneline | wc -l)
          if [[ "$COMMITS" -gt "0" ]]; then
            echo "changes-made=true" >> "$GITHUB_OUTPUT"
            echo "✅ ${COMMITS} commit(s) found on branch."
          else
            echo "changes-made=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No commits found on branch beyond main."
          fi
        shell: bash

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Draft PR — open the pull request and notify on the issue
  # ─────────────────────────────────────────────────────────────────────────────
  draft-pr:
    name: Open Draft PR
    needs:
      - triage
      - ai-generate
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.triage.outputs.branch-name }}
          fetch-depth: 0

      - name: Create draft pull request
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ needs.triage.outputs.branch-name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          CHANGES_MADE: ${{ needs.ai-generate.outputs.changes-made }}
        run: |
          if [[ "$CHANGES_MADE" == "true" ]]; then
            STATUS_NOTE="The AI has committed proposed changes to this branch. Review each commit carefully."
          else
            STATUS_NOTE="⚠️ The AI did not produce automated commits. Manual implementation of the fix proposal is required."
          fi

          PR_URL=$(gh pr create \
            --draft \
            --base main \
            --head "$BRANCH_NAME" \
            --title "fix: $ISSUE_TITLE" \
            --label "ai-generated" \
            --label "needs-review" \
            --body "$(cat <<EOF
          ## Summary

          This draft Pull Request was **automatically generated** by the AI agentic workflow in response to Issue #${ISSUE_NUMBER}.

          Closes #${ISSUE_NUMBER}

          ---

          ## AI Generation Status

          ${STATUS_NOTE}

          ## Review Checklist

          > ⚠️ **AI-generated code requires human review before merging.**

          - [ ] I have read and understood all AI-generated changes
          - [ ] The fix correctly addresses the problem described in Issue #${ISSUE_NUMBER}
          - [ ] Existing tests still pass: \`uv run pytest\`
          - [ ] Test coverage is ≥92%
          - [ ] No new security vulnerabilities have been introduced
          - [ ] No intentional vulnerabilities (teaching tools) have been accidentally removed
          - [ ] Code follows project style (ruff, 128-char line length, PEP 257 docstrings)
          - [ ] Commit message(s) follow Conventional Commits format
          - [ ] Django migrations are included if models were changed

          ## Workflow Details

          - **Triggered by:** Issue #${ISSUE_NUMBER} labelled with \`ai-fix\`
          - **Branch:** \`${BRANCH_NAME}\`
          - **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ---
          *Generated by the AI agentic workflow. Always verify AI-generated code before merging.*
          EOF
          )")

          echo "pr-url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "✅ Draft PR created: ${PR_URL}"
        shell: bash

      - name: Update issue with PR link
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_URL: ${{ steps.create-pr.outputs.pr-url }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<EOF
          ## ✅ Draft PR Created

          The AI agentic workflow has completed its analysis and a draft Pull Request is now available for your team to review:

          👉 **${PR_URL}**

          **Next steps for your team:**
          1. Open the draft PR linked above
          2. Review all AI-generated changes carefully
          3. Run the test suite: \`uv run pytest\`
          4. Mark the PR as **Ready for Review** once satisfied
          5. Merge after passing CI and code review

          > ⚠️ Do not merge without human review. AI-generated code may contain errors or incorrect assumptions.
          EOF
          )"
        shell: bash
