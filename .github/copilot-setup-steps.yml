---
# Copilot Coding Agent — Environment Setup
# This file pre-installs the full development environment so the native
# Copilot coding agent has everything it needs when it starts working on an issue.
# Docs: https://docs.github.com/en/copilot/customizing-copilot/customizing-the-development-environment-for-copilot-coding-agent

steps:
  - name: Install uv
    run: |
      curl -LsSf https://astral.sh/uv/install.sh | sh
      echo "$HOME/.local/bin" >> "$GITHUB_PATH"
    shell: bash

  - name: Set up Python 3.10
    run: |
      uv python install 3.10
    shell: bash

  - name: Install project dependencies
    run: |
      uv sync --all-extras --dev --frozen
    shell: bash

  - name: Install Playwright browsers
    run: |
      uv run playwright install --with-deps chromium
    shell: bash

  - name: Run Django system checks and migrations
    run: |
      uv run python manage.py check
      uv run python manage.py migrate --run-syncdb
    shell: bash

  - name: Verify test suite baseline
    run: |
      uv run pytest --co -q 2>&1 | tail -5
    shell: bash
