# Markdownlint configuration for this project

# Default state for all rules
default: true

# MD013/line-length - Line length
MD013:
  # Number of characters
  line_length: 999
  # Number of characters for headings
  heading_line_length: 120
  # Number of characters for code blocks
  code_block_line_length: 120
  # Include code blocks
  code_blocks: true
  # Include tables
  tables: true
  # Include headings
  headings: true
  # Include headings when calculating line length
  headers: true
  # Strict length checking
  strict: false
  # Stern length checking
  stern: false

# MD022/blanks-around-headings - Headings should be surrounded by blank lines
MD022: false

# MD024/no-duplicate-heading - Multiple headings with the same content
MD024:
  # Allow duplicate headings in different sections
  siblings_only: true

# MD031/blanks-around-fences - Fenced code blocks should be surrounded by blank lines
MD031: false

# MD032/blanks-around-lists - Lists should be surrounded by blank lines
MD032: false

# MD033/no-inline-html - Inline HTML
MD033:
  # Allowed elements
  allowed_elements: []

# MD034/no-bare-urls - Bare URL used
MD034: false

# MD036/no-emphasis-as-heading - Emphasis used instead of a heading
MD036: false

# MD038/no-space-in-code - Spaces inside code span elements
MD038: false

# MD040/fenced-code-language - Fenced code blocks should have a language specified
MD040: false

# MD041/first-line-heading - First line in file should be a top level heading
MD041: false

# MD050/strong-style - Strong style should be consistent
MD050: false

# MD060/table-column-style - Table column style
MD060: false
